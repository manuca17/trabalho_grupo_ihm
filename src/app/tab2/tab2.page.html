<ion-header [translucent]="true">
  <ion-toolbar class="search-toolbar">
    <div class="search-header">
      <div class="search-header__content">
        <strong>AncientCoins</strong>
        <span>Colecionadores de Moedas</span>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="add-coin-content">
  <div class="form-container">
    <section class="page-intro">
      <h1>{{ pageTitle }}</h1>
      <p>Preencha os detalhes e tire fotografias da sua moeda.</p>
    </section>

    <form [formGroup]="offerForm" class="offer-form" (ngSubmit)="handleSubmit()">
      
      <!-- Bloco de Fotos -->
      <section class="photos-section">
        <label class="section-label">Fotografias da Moeda</label>

        <div class="capture-grid">
          <button
            type="button"
            class="capture-card"
            *ngFor="let step of photoSteps; let i = index"
            (click)="capturePhoto(step)"
          >
            <ng-container *ngIf="getPhotoForStep(step.kind) as captured; else capturePlaceholder">
              <div class="photo-wrapper">
                <img [src]="captured.dataUrl" [alt]="captured.label" />
                <button
                  type="button"
                  class="remove-btn"
                  (click)="removePhoto(step.kind); $event.stopPropagation()"
                >
                  <ion-icon name="close-circle"></ion-icon>
                </button>
              </div>
              <strong>{{ captured.label }}</strong>
            </ng-container>

            <ng-template #capturePlaceholder>
              <ion-icon name="camera-outline" class="camera-icon"></ion-icon>
              <strong>{{ step.label }}</strong>
              <span>Toca para abrir a câmara</span>
            </ng-template>
          </button>
        </div>
        <p class="hint-text">Recomendamos 3 fotos: anverso, reverso e bordo da moeda</p>
      </section>

      <!-- Elementos de Detalhes -->
      <div class="figma-form-group">
        <div class="figma-input-item">
          <label>Título / Descrição Breve</label>
          <input type="text" formControlName="title" placeholder="Ex: Denário Romano - Augusto" />
        </div>

        <div class="figma-row-grid">
          <div class="figma-input-item">
            <label>Quantidade</label>
            <input type="number" min="1" formControlName="quantity" />
          </div>

          <div class="figma-input-item">
            <label>Era Histórica</label>
            <select formControlName="era">
              <option value="" disabled selected>Selecionar</option>
              <option value="romano">Império Romano</option>
              <option value="grego">Grécia Antiga</option>
              <option value="portugues">Portugal</option>
              <option value="bizantino">Império Bizantino</option>
            </select>
          </div>
        </div>

        <div class="figma-input-item">
          <label>Estado de Conservação</label>
          <select formControlName="condition">
            <option value="" disabled selected>Selecionar</option>
            <option value="bc">BC (Bem Conservada)</option>
            <option value="mbc">MBC (Muito Bem Conservada)</option>
            <option value="bela">Bela</option>
            <option value="soberba">Soberba</option>
          </select>
        </div>

        <div class="figma-input-item">
          <label>Descrição Detalhada</label>
          <textarea rows="4" formControlName="description" placeholder="Detalhes sobre origem, características, história..."></textarea>
        </div>

        <div class="figma-input-item">
          <label>Valor Real Estimado (€)</label>
          <input type="number" step="0.01" formControlName="realValue" placeholder="0" />
        </div>

        <div class="availability-section">
          <label class="availability-label">Disponível para</label>
          <div class="segment-container">
            <ion-segment formControlName="availableFor">
              <ion-segment-button value="sale">
                <ion-label>VENDA</ion-label>
              </ion-segment-button>
              <ion-segment-button value="trade">
                <ion-label>TROCA</ion-label>
              </ion-segment-button>
            </ion-segment>
          </div>
        </div>

        <div class="figma-input-item" *ngIf="offerForm.get('availableFor')?.value === 'sale'">
          <label>Preço de Venda (€)</label>
          <input type="number" step="0.01" formControlName="salePrice" placeholder="0" />
        </div>
      </div>

      <!-- Informações Adicionais (opcionais) -->
      <div class="figma-form-group optional-section">
        <p class="section-label optional-label">Informações Adicionais <span>(opcional)</span></p>

        <div class="figma-row-grid">
          <div class="figma-input-item">
            <label>Peso</label>
            <input type="text" formControlName="weight" placeholder="Ex: 7.9g" />
          </div>
          <div class="figma-input-item">
            <label>Diâmetro</label>
            <input type="text" formControlName="diameter" placeholder="Ex: 19mm" />
          </div>
        </div>

        <div class="figma-input-item">
          <label>Material / Metal</label>
          <input type="text" formControlName="material" placeholder="Ex: Ouro, Prata, Bronze..." />
        </div>

        <div class="figma-input-item">
          <label>Origem Histórica</label>
          <input type="text" formControlName="origin" placeholder="Ex: Roma Antiga" />
        </div>

        <div class="figma-input-item">
          <label>Localização do Vendedor</label>
          <input type="text" formControlName="location" placeholder="Ex: Lisboa, Portugal" />
        </div>

        <div class="figma-input-item">
          <label>História</label>
          <textarea rows="3" formControlName="history" placeholder="Contexto histórico sobre esta moeda..."></textarea>
        </div>

        <div class="figma-input-item">
          <label>Referência Catalográfica</label>
          <input type="text" formControlName="reference" placeholder="Ex: RIC I 544" />
        </div>
      </div>

      <div class="submit-container">
        <button
          type="submit"
          class="figma-submit-btn"
          [disabled]="offerForm.invalid || photos.length < 3"
        >
          {{ mode === 'edit' ? 'GUARDAR ALTERAÇÕES' : 'PUBLICAR MOEDA' }}
        </button>
      </div>
    </form>
  </div>
</ion-content>
