<ion-header [translucent]="true">
  <ion-toolbar class="app-toolbar">
    <div class="app-header-body">
      <div class="app-header-body__content">
        <strong>AncientCoins</strong>
        <span>Colecionadores de Moedas</span>
      </div>
    </div>
  </ion-toolbar>

  <ion-toolbar class="search-bar-toolbar">
    <div class="search-panel-top">
      <div class="search-input-row">

        <div class="search-box">
          <ion-icon name="search-outline"></ion-icon>
          <ion-input
            placeholder="Pesquisar moedas..."
            [value]="searchQuery"
            (ionInput)="updateSearchQuery($event.detail.value)"
          ></ion-input>
        </div>

        <button
          type="button"
          class="filter-toggle-button"
          [class.filter-toggle-button--active]="showFilters || hasActiveFilters"
          (click)="toggleFilters()"
        >
          <ion-icon name="options-outline"></ion-icon>
        </button>

      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="search-content">

  <!-- Painel de filtros: só aparece quando aberto, separado das pesquisas populares -->
  <div class="filters-panel" *ngIf="showFilters">
    <div class="filter-field">
      <label class="filter-field__label">Era Histórica</label>
      <div class="filter-select-wrap">
        <select class="filter-select" [(ngModel)]="pendingEra">
          <option *ngFor="let opt of eraOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
        <ion-icon name="chevron-down-outline" class="select-arrow"></ion-icon>
      </div>
    </div>

    <div class="filter-field">
      <label class="filter-field__label">Estado de Conservação</label>
      <div class="filter-select-wrap">
        <select class="filter-select" [(ngModel)]="pendingCondition">
          <option *ngFor="let opt of conditionOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
        <ion-icon name="chevron-down-outline" class="select-arrow"></ion-icon>
      </div>
    </div>

    <div class="filter-field">
      <label class="filter-field__label">Disponível para</label>
      <div class="filter-select-wrap">
        <select class="filter-select" [(ngModel)]="pendingAvailableFor">
          <option *ngFor="let opt of availableForOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
        <ion-icon name="chevron-down-outline" class="select-arrow"></ion-icon>
      </div>
    </div>

    <div class="filter-actions">
      <button type="button" class="filter-btn-clear" (click)="clearFilters()">Limpar</button>
      <button type="button" class="filter-btn-apply" (click)="applyFilters()">Aplicar Filtros</button>
    </div>
  </div>

  <!-- Pesquisas populares: sempre visíveis, fora do painel de filtros -->
  <div class="search-extended-area">
    <p class="popular-label">Pesquisas populares:</p>
    <div class="popular-buttons">
      <button
        *ngFor="let term of popularSearchTerms"
        type="button"
        class="popular-button"
        (click)="setSearchTerm(term)"
      >
        {{ term }}
      </button>
    </div>
  </div>

  <section class="search-page">
    <ng-container *ngIf="!searchQuery && !hasActiveFilters; else searchResultsArea">
      <section class="empty-area">
        <div class="empty-illustration">🔍</div>
        <h3>Procura algo específico?</h3>
        <p>Use a barra de pesquisa para encontrar moedas por era histórica, tipo ou descrição</p>
      </section>
    </ng-container>

    <ng-template #searchResultsArea>
      <ng-container *ngIf="searchResults$ | async as results; else loadingOrError">
        <ng-container *ngIf="results.length; else noResults">
          <div class="results-list">
            <button
              *ngFor="let item of results"
              type="button"
              class="result-card"
              (click)="openCoinById(item.id)"
            >
              <div class="result-image">
                <img [src]="item.image" [alt]="item.title" />
              </div>
              <div class="result-body">
                <div>
                  <h3>{{ item.title }}</h3>
                  <p class="result-meta">{{ item.era }}</p>
                </div>
                <div class="result-tags">
                  <span class="tag">{{ item.condition }}</span>
                  <span class="tag" *ngIf="item.forTrade">Troca</span>
                </div>
                <p class="result-seller">Por {{ item.seller }}</p>
              </div>
              <div class="result-price">{{ item.price }}</div>
            </button>
          </div>
        </ng-container>
      </ng-container>
    </ng-template>

    <ng-template #noResults>
      <section class="empty-area empty-area--no-results">
        <div class="empty-illustration">😔</div>
        <h3>Sem resultados</h3>
        <p>Tente outro termo ou ajuste os filtros para encontrar uma moeda.</p>
      </section>
    </ng-template>

    <ng-template #loadingOrError>
      <section class="empty-area">
        <ion-spinner name="crescent" color="primary"></ion-spinner>
        <p>A carregar o catálogo de numismática...</p>
      </section>
    </ng-template>
  </section>

</ion-content>
