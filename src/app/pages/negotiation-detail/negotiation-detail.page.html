<ion-header>
  <ion-toolbar class="app-toolbar">
    <ion-buttons slot="start">
      <button type="button" class="back-nav-btn" (click)="goBack()">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>
    </ion-buttons>
    <div class="chat-header-info">
      <div class="chat-avatar-circle">
        <ion-icon name="person-outline"></ion-icon>
      </div>
      <div class="chat-header-text">
        <strong>{{ thread?.sellerName || 'Vendedor' }}</strong>
        <span>{{ offerCoin?.name || 'Negociação' }}</span>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="chat-content" #chatContent>
  <ng-container *ngIf="thread; else noThread">
    <div class="status-banner" [class.status-banner--done]="thread.status === 'traded'">
      <ion-icon [name]="thread.status === 'traded' ? 'checkmark-circle-outline' : 'time-outline'"></ion-icon>
      <span>{{ thread.status === 'traded' ? 'Negociação concluída' : 'Em negociação' }}</span>
    </div>

    <div class="messages-list">
      <div
        class="bubble-wrap"
        *ngFor="let message of thread.messages"
        [class.bubble-wrap--self]="isOwnMessage(message)"
      >
        <div class="bubble" [class.bubble--self]="isOwnMessage(message)">
          <p class="bubble__body">{{ message.body }}</p>
          <span class="bubble__time">{{ message.sentAt | date:'HH:mm' }}</span>
        </div>
      </div>
    </div>
  </ng-container>

  <ng-template #noThread>
    <div class="empty-chat">
      <ion-icon name="chatbubbles-outline"></ion-icon>
      <p>Conversa não encontrada.</p>
    </div>
  </ng-template>
</ion-content>

<ion-footer class="chat-footer" *ngIf="thread">
  <div class="composer-bar">
    <input
      class="composer-input"
      [(ngModel)]="draftMessage"
      placeholder="Escrever mensagem..."
      (keyup.enter)="sendMessage()"
    />
    <button
      type="button"
      class="send-btn"
      (click)="sendMessage()"
      [disabled]="!draftMessage.trim()"
    >
      <ion-icon name="send"></ion-icon>
    </button>
  </div>
  <button
    *ngIf="thread.status !== 'traded'"
    type="button"
    class="conclude-btn"
    (click)="acceptTrade()"
  >
    <ion-icon name="checkmark-done-outline"></ion-icon>
    Marcar negociação como concluída
  </button>
</ion-footer>
